! FRR configuration for open-nos-as5610 (Edgecore AS5610-52X)
!
! Routes installed by FRR are picked up by nos-switchd via netlink
! (RTM_NEWROUTE/RTM_DELROUTE) and programmed directly into the
! BCM56846 ASIC L3 forwarding tables for hardware-accelerated routing.
!
! Edit this file and restart FRR: systemctl restart frr
!
hostname as5610
password zebra
enable password zebra
!
log syslog informational
!
! --- Zebra (interface management) ---
!
ip forwarding
ipv6 forwarding
!
! --- BGP ---
!
! Uncomment and configure for your AS and peers:
!
! router bgp 65000
!  bgp router-id 10.0.0.1
!  bgp bestpath as-path multipath-relax
!  neighbor FABRIC peer-group
!  neighbor FABRIC remote-as external
!  neighbor swp1 interface peer-group FABRIC
!  neighbor swp2 interface peer-group FABRIC
!  !
!  address-family ipv4 unicast
!   redistribute connected
!   maximum-paths 16
!  exit-address-family
! !
!
! --- OSPF ---
!
! Uncomment and configure for your network:
!
! router ospf
!  ospf router-id 10.0.0.1
!  network 10.0.0.0/24 area 0
!  passive-interface eth0
! !
!
! --- Static routes ---
!
! ip route 0.0.0.0/0 10.0.0.254
!
line vty
!
